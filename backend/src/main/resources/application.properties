spring.application.name=ItemFinder

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3307/itemfinder?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

# New Relic APM
new_relic.license_key=${NEW_RELIC_LICENSE_KEY:}
new_relic.app_name=${NEW_RELIC_APP_NAME:ItemFinder}
new_relic.environment=${NEW_RELIC_ENVIRONMENT:local}
